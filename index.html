<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lac-Leamy Dealer Trainer</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>CASINO LAC-LEAMY</h1>
      <span>Dealer trainer</span>
    </div>

    <div class="topbar-center">
      <div id="center-console">
        <button id="deal-btn" onclick="startRound()">Deal round</button>

        <div id="action-hud" class="hud-hidden" aria-live="polite">
          <div class="hud-text">
            <span class="hud-kicker">Call total</span>
            <span id="hud-title">SPOT 1 TOTAL</span>
          </div>
          <input type="number" id="hud-input" autocomplete="off" inputmode="numeric" />
        </div>
      </div>
    </div>

    <div class="tabs">
      <button id="tab-game" class="active" onclick="switchTab('game')">Live Table</button>
      <button id="tab-payout" onclick="switchTab('payout')">3:2 Payouts</button>
    </div>
  </header>

  <main id="game-mode">
    <div class="table-shell" id="table-shell">
      <div class="table-rail">
        <div class="table-felt">
          <div class="table-glow"></div>

          <section class="dealer-zone">
            <div class="dealer-caption">Dealer</div>
            <div id="dealer-spot" class="spot dealer-spot">
              <div class="hand" id="dealer-hand"></div>
              <div class="status-text" id="dealer-status"></div>
            </div>
          </section>

          <section class="table-copy">
            <div class="felt-text">HOUSE STRATEGY</div>
            <div class="felt-text subtle">DEALER MUST DRAW TO 16 • SOFT 17 RULE AS POSTED</div>
          </section>

          <section class="players-row" id="players-arc"></section>
        </div>
      </div>
    </div>
  </main>

  <main id="payout-mode" style="display: none;">
    <div class="payout-shell" id="payout-shell">
      <div class="payout-widget random-mode" id="payout-widget">
        <h2>BLACKJACK PAYOUT</h2>

        <div class="payout-submodes">
          <button id="payout-mode-random" class="active" onclick="setPayoutMode('random')">Random</button>
          <button id="payout-mode-sprint" onclick="setPayoutMode('sprint')">Sprint 1–50</button>
        </div>

        <p id="payout-description">Enter the correct 3:2 payout for the bet below.</p>

        <div class="random-meta" id="random-meta">
          <div class="meta-pill wide-pill current-streak-pill">
            <span class="meta-label">Current streak 🔥</span>
            <strong id="random-current-streak">0</strong>
          </div>
          <div class="meta-pill wide-pill">
            <span class="meta-label">Best streak</span>
            <strong id="random-best-streak">0</strong>
          </div>
        </div>

        <div class="sprint-meta" id="sprint-meta">
          <div class="meta-pill">
            <span class="meta-label">Progress</span>
            <strong id="payout-progress">1 / 50</strong>
          </div>
          <div class="meta-pill">
            <span class="meta-label">Time</span>
            <strong id="payout-timer">00:00.00</strong>
          </div>
          <div class="meta-pill current-streak-pill">
            <span class="meta-label">Current streak 🔥</span>
            <strong id="sprint-current-streak">0</strong>
          </div>
          <div class="meta-pill">
            <span class="meta-label">Best streak</span>
            <strong id="sprint-best-streak">0</strong>
          </div>
        </div>

        <div class="bet-amount">$<span id="payout-bet"></span></div>

        <input type="number" id="payout-input" step="any" placeholder="0.00" inputmode="decimal" />

        <div id="payout-feedback" class="feedback-text"></div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
